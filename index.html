<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏期強化合宿 活動レポート【デモ】</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a6fc4; --blue-dark: #0f4d8a; --blue-light: #e8f2fb;
    --gray-bg: #f5f6f8; --gray-border: #dde1e7; --gray-text: #6b7280;
    --text: #1a1d23; --white: #ffffff; --danger: #dc2626;
  }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }

  #login-screen {
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #0f4d8a 0%, #1a6fc4 100%); padding: 1rem;
  }
  .login-card {
    background: white; border-radius: 16px; padding: 2.5rem 2rem;
    width: 100%; max-width: 380px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); text-align: center;
  }
  .login-icon { font-size: 2.5rem; margin-bottom: 0.5rem; }
  .demo-badge {
    display: inline-block; background: #fef3c7; color: #92400e;
    font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.75rem;
    border-radius: 20px; margin-bottom: 0.75rem; border: 1px solid #fcd34d;
  }
  .login-title { font-size: 1.2rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 0.25rem; }
  .login-sub { font-size: 0.82rem; color: var(--gray-text); margin-bottom: 1.5rem; }
  .login-card input[type="password"] {
    width: 100%; padding: 0.75rem 1rem; border: 1.5px solid var(--gray-border);
    border-radius: 8px; font-size: 1rem; font-family: inherit; margin-bottom: 0.75rem;
    text-align: center; letter-spacing: 0.2em; transition: border-color 0.2s;
  }
  .login-card input:focus { outline: none; border-color: var(--blue); }
  .login-btn {
    width: 100%; padding: 0.75rem; background: var(--blue); color: white; border: none;
    border-radius: 8px; font-size: 1rem; font-weight: 700; font-family: inherit; cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--blue-dark); }
  .login-hint { font-size: 0.78rem; color: var(--gray-text); margin-top: 0.75rem; }
  .login-hint code { background: var(--gray-bg); padding: 0.1rem 0.4rem; border-radius: 4px; font-family: monospace; letter-spacing: 0; }
  .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem; display: none; }

  #app { display: none; }

  header { background: var(--blue-dark); color: white; padding: 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
  .header-main { padding: 1rem 1.5rem; display: flex; align-items: center; justify-content: space-between; }
  .header-camp-name { font-size: 0.75rem; opacity: 0.7; margin-bottom: 0.15rem; }
  .header-title { font-size: 1.15rem; font-weight: 700; }
  .header-links { background: rgba(0,0,0,0.2); padding: 0.5rem 1.5rem; display: flex; gap: 0.75rem; align-items: center; }
  .header-link-btn {
    padding: 0.3rem 0.85rem; border-radius: 6px; font-size: 0.78rem; font-family: inherit;
    font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.3);
    background: transparent; color: white; display: inline-flex; align-items: center; gap: 0.3rem;
    transition: background 0.2s;
  }
  .header-link-btn:hover { background: rgba(255,255,255,0.15); }
  .btn-sm {
    padding: 0.4rem 0.9rem; border-radius: 6px; font-size: 0.8rem; font-family: inherit;
    font-weight: 500; cursor: pointer; border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent; color: white; transition: all 0.2s;
  }
  .btn-sm:hover { background: rgba(255,255,255,0.1); }

  .demo-bar {
    background: #fef3c7; border-bottom: 1px solid #fcd34d;
    padding: 0.5rem 1.5rem; font-size: 0.78rem; color: #92400e; font-weight: 500; text-align: center;
  }

  .search-bar {
    background: white; border-bottom: 1px solid var(--gray-border);
    padding: 0.75rem 1.5rem; display: flex; align-items: center; gap: 0.5rem;
  }
  .search-icon { color: var(--gray-text); font-size: 1rem; flex-shrink: 0; }
  .search-input {
    flex: 1; max-width: 520px; padding: 0.5rem 0.9rem;
    border: 1.5px solid var(--gray-border); border-radius: 8px;
    font-size: 0.9rem; font-family: inherit; transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: var(--blue); }
  .search-count { font-size: 0.8rem; color: var(--gray-text); margin-left: 0.25rem; }

  main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }

  .post-card {
    background: white; border-radius: 12px; border: 1px solid var(--gray-border);
    margin-bottom: 1.25rem; overflow: hidden; animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .post-header {
    padding: 0.9rem 1.25rem 0.6rem; border-bottom: 1px solid var(--gray-border);
    display: flex; align-items: baseline; gap: 0.75rem; flex-wrap: wrap;
  }
  .post-datetime { font-size: 0.82rem; font-weight: 700; color: var(--blue); white-space: nowrap; }
  .post-title { font-size: 1rem; font-weight: 700; color: var(--text); flex: 1; }
  .post-body { padding: 1rem 1.25rem; font-size: 0.9rem; line-height: 1.8; color: var(--text); }
  .post-body a { color: var(--blue); }

  .post-media { display: grid; gap: 4px; padding: 0 1.25rem 1.25rem; }
  .post-media.count-1 { grid-template-columns: 1fr; }
  .post-media.count-2 { grid-template-columns: 1fr 1fr; }
  .post-media.count-3 { grid-template-columns: 1fr 1fr 1fr; }
  .post-media.count-many { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .media-item { border-radius: 6px; overflow: hidden; }
  .img-placeholder {
    width: 100%; height: 180px; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: linear-gradient(135deg, #dbeafe 0%, #e0f2fe 100%);
    color: #3b82f6; font-size: 0.78rem; gap: 0.4rem; border-radius: 6px;
    border: 1px dashed #93c5fd;
  }
  .img-placeholder .ph-icon { font-size: 2rem; }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--gray-text); font-size: 0.9rem; }
</style>
</head>
<body>

<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🏃</div>
    <div class="demo-badge">⚠️ デモ版</div>
    <div class="login-title">夏期強化合宿</div>
    <div class="login-sub">活動レポート閲覧ページ<br>パスコードを入力してください</div>
    <input type="password" id="viewer-pw" placeholder="パスコード" />
    <button class="login-btn" onclick="viewerLogin()">入る</button>
    <div class="login-hint">デモ用パスコード: <code>2024camp</code></div>
    <div class="login-error" id="viewer-err">パスコードが違います</div>
  </div>
</div>

<div id="app">
  <header>
    <div class="header-main">
      <div>
        <div class="header-camp-name">陸上競技</div>
        <div class="header-title">夏期強化合宿 活動レポート</div>
      </div>
      <button class="btn-sm" onclick="viewerLogout()">ログアウト</button>
    </div>
    <div class="header-links">
      <button class="header-link-btn">📂 写真フォルダ</button>
      <button class="header-link-btn">📅 スケジュール確認</button>
    </div>
  </header>

  <div class="demo-bar">📋 これはデモ版です。サンプル投稿が表示されています。実際の運用では管理者が投稿した内容がここに表示されます。</div>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="キーワードで検索..." oninput="handleSearch()" />
    <span class="search-count" id="search-count"></span>
  </div>

  <main>
    <div id="posts-container"></div>
  </main>
</div>

<script>
const VIEWER_PW = '2024camp';

const DEMO_POSTS = [
  {
    id: 6,
    datetime: '2026-08-10T22:00',
    title: '合宿全日程終了！',
    body: '<b>22:00</b> 夏期強化合宿の全日程が終了いたしました。<br><br>参加してくださった選手・保護者の皆さま、本当にありがとうございました！3日間にわたる合宿を通じて、選手たちは大きく成長できたと思います。<br><br>各選手の記録向上・技術改善に向けて引き続きサポートしてまいります。来年の合宿でもよろしくお願いします🔥',
    media: [
      { label: '集合写真（全体）' },
      { label: '表彰セレモニー' }
    ]
  },
  {
    id: 5,
    datetime: '2026-08-10T19:30',
    title: '新宿組・海老名組 帰路へ出発',
    body: '<b>19:30</b> 新宿組到着・海老名組出発。海老名出発後も大きな渋滞等はなく、無事新宿に到着。続いて海老名組も予定通り出発しました。<br><br>到着予定は21:00頃の見込みです。',
    media: []
  },
  {
    id: 4,
    datetime: '2026-08-10T16:57',
    title: '3日目 午後練習終了',
    body: '<b>16:30</b> キッズ・ユース練習終了 → 新宿組・海老名組出発。<br><br>3日目の午後練習では<b style="color:#1a6fc4;">走幅跳・三段跳のコンビネーション練習</b>を実施。暑い中でも集中力を切らさず取り組んでいました！<br><br>今日の夕食後はミーティングを行い、各自の振り返りを共有しました。',
    media: [
      { label: '走幅跳練習の様子' },
      { label: 'ミーティング' },
      { label: '夕食の様子' }
    ]
  },
  {
    id: 3,
    datetime: '2026-08-10T12:34',
    title: '3日目 午前練習',
    body: '<b>12:30</b> キッズ・ユース以上 午前練習終了。<br><br>競技場が開くまで、合同で<b>鬼ごっこ・ウォームアップ</b>を実施しました。子どもたちも元気よく走り回り、良いウォームアップになりました。<br><br>その後は種目別に分かれて技術練習。<a href="#">高跳び組の踏切動画はこちら</a>',
    media: [
      { label: '朝のウォームアップ' }
    ]
  },
  {
    id: 2,
    datetime: '2026-08-09T20:15',
    title: '2日目 夜 勉強会',
    body: '<b>20:00</b> 中学生以上 勉強会・プライオトレーニングとコーチの陸上人生対談。<br><br>本日の勉強会テーマは「<b>接地と推進力の関係</b>」。映像を見ながらフォーム分析を行いました。<br><br>「接地時間を短くするより、接地の質を意識せよ」 — 選手からも積極的な質問が出ました🎯',
    media: []
  },
  {
    id: 1,
    datetime: '2026-08-08T10:00',
    title: '合宿スタート！開会式',
    body: '<b>10:00</b> 夏期強化合宿、いよいよスタートです！<br><br>今年のテーマは「<b style="color:#dc2626;">自己ベスト更新</b>」。各自が目標を宣言し、3日間の合宿に臨みます。全員で最高の合宿にしましょう！',
    media: [
      { label: '開会式の様子' },
      { label: '選手集合写真' }
    ]
  }
];

function viewerLogin() {
  const pw = document.getElementById('viewer-pw').value;
  if (pw === VIEWER_PW) {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    renderPosts(DEMO_POSTS);
  } else {
    document.getElementById('viewer-err').style.display = 'block';
  }
}
document.getElementById('viewer-pw').addEventListener('keydown', e => { if (e.key === 'Enter') viewerLogin(); });
function viewerLogout() {
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('viewer-pw').value = '';
}

function renderPosts(posts) {
  const el = document.getElementById('posts-container');
  if (!posts.length) { el.innerHTML = '<div class="empty-state">該当する記事がありません</div>'; return; }
  el.innerHTML = posts.map(buildPostCard).join('');
}

function buildPostCard(p) {
  const mc = (p.media || []).length;
  const gc = mc === 1 ? 'count-1' : mc === 2 ? 'count-2' : mc === 3 ? 'count-3' : 'count-many';
  const mediaHTML = mc > 0 ? `
    <div class="post-media ${gc}">
      ${p.media.map(m => `<div class="media-item"><div class="img-placeholder"><span class="ph-icon">🖼️</span><span>${m.label}</span></div></div>`).join('')}
    </div>` : '';
  return `
    <div class="post-card">
      <div class="post-header">
        <span class="post-datetime">${fmt(p.datetime)}</span>
        <span class="post-title">${esc(p.title)}</span>
      </div>
      <div class="post-body">${p.body}</div>
      ${mediaHTML}
    </div>`;
}

function handleSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) { renderPosts(DEMO_POSTS); document.getElementById('search-count').textContent = ''; return; }
  const f = DEMO_POSTS.filter(p => p.title.toLowerCase().includes(q) || p.body.replace(/<[^>]+>/g,'').toLowerCase().includes(q));
  renderPosts(f);
  document.getElementById('search-count').textContent = f.length + '件';
}

function fmt(dt) {
  const d = new Date(dt);
  return (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getDate().toString().padStart(2,'0') + ' ' + d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
}
function esc(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
</script>
</body>
</html>
