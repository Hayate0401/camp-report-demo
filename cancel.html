<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>キャンセル規約 | 夏期強化合宿</title>
<script>if(!sessionStorage.getItem('camp_auth')){location.replace('viewer.html');}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1a6fc4; --blue-dark: #0f4d8a; --blue-light: #e8f2fb; --gray-bg: #f5f6f8; --gray-border: #dde1e7; --gray-text: #6b7280; --text: #1a1d23; --danger: #dc2626; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }
  header { background: var(--blue-dark); color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-main { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .back-btn {
    padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-family: inherit;
    font-weight: 500; border: 1px solid rgba(255,255,255,0.4); background: transparent;
    color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); }
  .h-sub { font-size: 0.72rem; opacity: 0.7; margin-bottom: 0.1rem; }
  .h-main { font-size: 1.1rem; font-weight: 700; }
  main { max-width: 720px; margin: 0 auto; padding: 1.5rem 1rem; }
  .intro {
    background: #fef9ec; border-radius: 12px; border: 1px solid #fde68a;
    padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: flex-start; gap: 0.75rem;
  }
  .intro-icon { font-size: 1.8rem; flex-shrink: 0; }
  .intro .title { font-size: 1rem; font-weight: 700; color: #92400e; margin-bottom: 0.2rem; }
  .intro .sub { font-size: 0.82rem; color: #78350f; }
  .rule-card {
    background: white; border-radius: 12px; border: 1px solid var(--gray-border);
    margin-bottom: 1rem; overflow: hidden;
  }
  .rule-header {
    background: var(--blue-light); border-bottom: 1px solid #bfdbfe;
    padding: 0.75rem 1.25rem;
    font-size: 0.95rem; font-weight: 700; color: var(--blue-dark);
    display: flex; align-items: center; gap: 0.5rem;
  }
  .rule-body { padding: 0.9rem 1.25rem; font-size: 0.88rem; line-height: 1.85; color: var(--text); white-space: pre-wrap; }
  .empty { text-align: center; padding: 3.5rem 1rem; color: var(--gray-text); background: white; border-radius: 12px; border: 1px solid var(--gray-border); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .contact-box {
    background: white; border-radius: 12px; border: 1px solid var(--gray-border);
    padding: 1.1rem 1.25rem; margin-top: 1.25rem; text-align: center;
  }
  .contact-box .label { font-size: 0.82rem; color: var(--gray-text); margin-bottom: 0.4rem; }
  .contact-box .main { font-size: 0.9rem; font-weight: 700; }
  .footer-note { text-align: center; font-size: 0.78rem; color: var(--gray-text); margin-top: 1.25rem; padding-bottom: 2rem; }
</style>
</head>
<body>
<header>
  <div class="header-main">
    <a href="viewer.html" class="back-btn">← 活動レポートへ</a>
    <div>
      <div class="h-sub">陸上競技</div>
      <div class="h-main">夏期強化合宿 キャンセル規約</div>
    </div>
  </div>
</header>
<main>
  <div class="intro">
    <div class="intro-icon">⚠️</div>
    <div>
      <div class="title">キャンセルについて</div>
      <div class="sub">キャンセルの際は必ず事前にスタッフへご連絡ください。以下の規約に基づき対応いたします。</div>
    </div>
  </div>
  <div id="container"></div>
  <div class="contact-box">
    <div class="label">キャンセルのご連絡・お問い合わせ</div>
    <div class="main">担当スタッフまでご連絡ください</div>
  </div>
  <div class="footer-note">※ このページの内容はスタッフが随時更新しています</div>
</main>
<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
const ICONS=['📌','📋','⚠️','ℹ️','📝'];
function render(){
  const rules=JSON.parse(localStorage.getItem('camp_cancel')||'[]');
  const el=document.getElementById('container');
  if(!rules.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>キャンセル規約はまだ登録されていません</div>';
    return;
  }
  el.innerHTML=rules.map((r,i)=>`
    <div class="rule-card">
      <div class="rule-header">${ICONS[i%ICONS.length]} ${esc(r.title)}</div>
      <div class="rule-body">${esc(r.body)}</div>
    </div>`).join('');
}
render();
</script>
</body>
</html>
