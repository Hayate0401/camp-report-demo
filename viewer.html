<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>夏期強化合宿 活動レポート</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue: #1a6fc4;
    --blue-dark: #0f4d8a;
    --blue-light: #e8f2fb;
    --gray-bg: #f5f6f8;
    --gray-border: #dde1e7;
    --gray-text: #6b7280;
    --text: #1a1d23;
    --white: #ffffff;
    --danger: #dc2626;
    --success: #16a34a;
  }
  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--gray-bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ===== LOGIN ===== */
  #login-screen {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #0f4d8a 0%, #1a6fc4 100%);
    padding: 1rem;
  }
  .login-card {
    background: white;
    border-radius: 16px;
    padding: 2.5rem 2rem;
    width: 100%;
    max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.2);
    text-align: center;
  }
  .login-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .login-title { font-size: 1.2rem; font-weight: 700; color: var(--blue-dark); margin-bottom: 0.25rem; }
  .login-sub { font-size: 0.82rem; color: var(--gray-text); margin-bottom: 1.75rem; }
  .login-card input[type="password"] {
    width: 100%;
    padding: 0.75rem 1rem;
    border: 1.5px solid var(--gray-border);
    border-radius: 8px;
    font-size: 1rem;
    font-family: inherit;
    margin-bottom: 0.75rem;
    text-align: center;
    letter-spacing: 0.2em;
    transition: border-color 0.2s;
  }
  .login-card input:focus { outline: none; border-color: var(--blue); }
  .login-btn {
    width: 100%;
    padding: 0.75rem;
    background: var(--blue);
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.2s;
  }
  .login-btn:hover { background: var(--blue-dark); }
  .login-error { color: var(--danger); font-size: 0.8rem; margin-top: 0.5rem; display: none; }

  /* ===== APP ===== */
  #app { display: none; }

  /* ===== HEADER ===== */
  header {
    background: var(--blue-dark);
    color: white;
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 8px rgba(0,0,0,0.2);
  }
  .header-main {
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .header-title-area { }
  .header-camp-name { font-size: 0.75rem; opacity: 0.7; margin-bottom: 0.15rem; }
  .header-title { font-size: 1.15rem; font-weight: 700; }
  .header-actions { display: flex; gap: 0.5rem; align-items: center; }

  /* Quick links in header */
  .header-links {
    background: rgba(0,0,0,0.2);
    padding: 0.5rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
  }
  .header-link-btn {
    padding: 0.3rem 0.85rem;
    border-radius: 6px;
    font-size: 0.78rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    border: 1px solid rgba(255,255,255,0.3);
    background: transparent;
    color: white;
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    transition: background 0.2s;
  }
  .header-link-btn:hover { background: rgba(255,255,255,0.15); }
  .btn-sm {
    padding: 0.4rem 0.9rem;
    border-radius: 6px;
    font-size: 0.8rem;
    font-family: inherit;
    font-weight: 500;
    cursor: pointer;
    border: 1.5px solid rgba(255,255,255,0.4);
    background: transparent;
    color: white;
    transition: all 0.2s;
  }
  .btn-sm:hover { background: rgba(255,255,255,0.1); }

  /* ===== SEARCH BAR ===== */
  .search-bar {
    background: white;
    border-bottom: 1px solid var(--gray-border);
    padding: 0.75rem 1.5rem;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }
  .search-icon { color: var(--gray-text); font-size: 1rem; flex-shrink: 0; }
  .search-input {
    flex: 1;
    max-width: 520px;
    padding: 0.5rem 0.9rem;
    border: 1.5px solid var(--gray-border);
    border-radius: 8px;
    font-size: 0.9rem;
    font-family: inherit;
    transition: border-color 0.2s;
  }
  .search-input:focus { outline: none; border-color: var(--blue); }
  .search-count { font-size: 0.8rem; color: var(--gray-text); margin-left: 0.25rem; }

  /* ===== POSTS ===== */
  main { max-width: 800px; margin: 0 auto; padding: 1.5rem 1rem; }

  .post-card {
    background: white;
    border-radius: 12px;
    border: 1px solid var(--gray-border);
    margin-bottom: 1.25rem;
    overflow: hidden;
    animation: fadeUp 0.3s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .post-header {
    padding: 0.9rem 1.25rem 0.6rem;
    border-bottom: 1px solid var(--gray-border);
    display: flex;
    align-items: baseline;
    gap: 0.75rem;
    flex-wrap: wrap;
  }
  .post-datetime {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--blue);
    white-space: nowrap;
  }
  .post-title {
    font-size: 1rem;
    font-weight: 700;
    color: var(--text);
    flex: 1;
  }
  .post-body {
    padding: 1rem 1.25rem;
    font-size: 0.9rem;
    line-height: 1.8;
    color: var(--text);
  }
  .post-body a { color: var(--blue); cursor: pointer; }
  .post-body a:hover { text-decoration: underline; }

  /* media gallery */
  .post-media {
    display: grid;
    gap: 4px;
    padding: 0 1.25rem 1.25rem;
  }
  .post-media.count-1 { grid-template-columns: 1fr; }
  .post-media.count-2 { grid-template-columns: 1fr 1fr; }
  .post-media.count-3 { grid-template-columns: 1fr 1fr 1fr; }
  .post-media.count-many { grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); }
  .media-item {
    position: relative;
    overflow: hidden;
    border-radius: 6px;
    cursor: pointer;
    background: #000;
  }
  .media-item img {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
    transition: transform 0.3s;
  }
  .media-item:hover img { transform: scale(1.03); }
  .media-item video {
    width: 100%;
    height: 160px;
    object-fit: cover;
    display: block;
  }
  .video-badge {
    position: absolute;
    top: 6px; left: 6px;
    background: rgba(0,0,0,0.65);
    color: white;
    font-size: 0.7rem;
    padding: 2px 6px;
    border-radius: 4px;
    font-weight: 700;
  }

  /* empty / no results */
  .empty-state {
    text-align: center;
    padding: 3rem 1rem;
    color: var(--gray-text);
    font-size: 0.9rem;
  }
  .empty-state-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }

  /* lightbox */
  .lightbox {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.92);
    z-index: 300;
    align-items: center;
    justify-content: center;
    flex-direction: column;
  }
  .lightbox.active { display: flex; }
  .lightbox img, .lightbox video { max-width: 92vw; max-height: 85vh; border-radius: 8px; }
  .lightbox-close {
    position: fixed;
    top: 1rem; right: 1.25rem;
    color: white;
    font-size: 1.8rem;
    cursor: pointer;
    background: none;
    border: none;
    line-height: 1;
  }
</style>
</head>
<body>

<!-- ===== LOGIN ===== -->
<div id="login-screen">
  <div class="login-card">
    <div class="login-icon">🏃</div>
    <div class="login-title">夏期強化合宿</div>
    <div class="login-sub">活動レポート閲覧ページ<br>パスコードを入力してください</div>
    <input type="password" id="viewer-pw" placeholder="パスコード" inputmode="numeric" />
    <button class="login-btn" onclick="viewerLogin()">入る</button>
    <div class="login-error" id="viewer-err">パスコードが違います</div>
  </div>
</div>

<!-- ===== APP ===== -->
<div id="app">
  <header>
    <div class="header-main">
      <div class="header-title-area">
        <div class="header-camp-name">陸上競技</div>
        <div class="header-title">夏期強化合宿 活動レポート</div>
      </div>
      <div class="header-actions">
        <button class="btn-sm" onclick="viewerLogout()">ログアウト</button>
      </div>
    </div>
    <div class="header-links" id="header-links" style="display:none;">
      <button class="header-link-btn" id="photo-btn" onclick="openPhoto()">📂 写真フォルダ</button>
      <a href="schedule.html" class="header-link-btn">📅 スケジュール確認</a>
      <a href="cancel.html" class="header-link-btn">📋 キャンセル規約</a>
      <a href="https://myfm.jp/s7Iloy/6931b39a6d22" target="_blank" class="header-link-btn">🍽️ 食物アレルギー申請</a>
    </div>
  </header>

  <div class="search-bar">
    <span class="search-icon">🔍</span>
    <input type="text" class="search-input" id="search-input" placeholder="キーワードで検索..." oninput="handleSearch()" />
    <span class="search-count" id="search-count"></span>
  </div>

  <main>
    <div id="posts-container"></div>
  </main>
</div>

<!-- lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <button class="lightbox-close" onclick="closeLightbox()">✕</button>
  <div id="lightbox-content"></div>
</div>

<script>
const VIEWER_PW = '202607';
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwwmsuauCT5MbgEYVYdd0u4vBK-0RKUUv7Ub09VSG5cAuSMoPnXeTXzKi64rue32NA/exec';

async function gasGet(action) {
  const res = await fetch(`${GAS_URL}?action=${action}`);
  return res.json();
}

function viewerLogin() {
  const pw = document.getElementById('viewer-pw').value;
  if (pw === VIEWER_PW) {
    sessionStorage.setItem('camp_auth', '1');
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').style.display = 'block';
    initViewer();
  } else {
    document.getElementById('viewer-err').style.display = 'block';
  }
}
document.getElementById('viewer-pw').addEventListener('keydown', e => { if (e.key === 'Enter') viewerLogin(); });
function viewerLogout() {
  sessionStorage.removeItem('camp_auth');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('viewer-pw').value = '';
}

async function initViewer() {
  const settings = await gasGet('getSettings');
  if (settings.photo_url) {
    document.getElementById('header-links').style.display = 'flex';
    document.getElementById('photo-btn').style.display = 'inline-flex';
    document.getElementById('photo-btn').onclick = () => window.open(settings.photo_url, '_blank');
  } else {
    document.getElementById('header-links').style.display = 'flex';
    document.getElementById('photo-btn').style.display = 'none';
  }
  const posts = await gasGet('getPosts');
  allPosts = posts;
  renderPosts(posts);
}

function openPhoto() {
  const url = localStorage.getItem('photo_folder_url');
  if (url) window.open(url, '_blank');
}

function getPosts() {
  return JSON.parse(localStorage.getItem('camp_posts') || '[]');
}

let allPosts = [];

function renderPosts(posts) {
  const container = document.getElementById('posts-container');
  if (posts.length === 0) {
    container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📋</div>該当する記事がありません</div>`;
    return;
  }
  container.innerHTML = posts.map(p => buildPostCard(p)).join('');
}

function buildPostCard(p) {
  const mediaCount = (p.media || []).length;
  const gridClass = mediaCount === 1 ? 'count-1' : mediaCount === 2 ? 'count-2' : mediaCount === 3 ? 'count-3' : 'count-many';
  const mediaHTML = mediaCount > 0 ? `
    <div class="post-media ${gridClass}">
      ${p.media.map((m, i) => m.type.startsWith('video') ? `
        <div class="media-item" onclick="openLightbox('video','${m.data}')">
          <video src="${m.data}" muted preload="metadata"></video>
          <span class="video-badge">▶ 動画</span>
        </div>` : `
        <div class="media-item" onclick="openLightbox('img','${m.data}')">
          <img src="${m.data}" loading="lazy" />
        </div>`
      ).join('')}
    </div>` : '';

  return `
    <div class="post-card">
      <div class="post-header">
        <span class="post-datetime">${formatDt(p.datetime)}</span>
        <span class="post-title">${escapeHtml(p.title)}</span>
      </div>
      <div class="post-body">${p.body}</div>
      ${mediaHTML}
    </div>`;
}

function handleSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  if (!q) {
    renderPosts(allPosts);
    document.getElementById('search-count').textContent = '';
    return;
  }
  const filtered = allPosts.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.body.toLowerCase().includes(q)
  );
  renderPosts(filtered);
  document.getElementById('search-count').textContent = `${filtered.length}件`;
}

function formatDt(dt) {
  const d = new Date(dt);
  return `${(d.getMonth()+1).toString().padStart(2,'0')}/${d.getDate().toString().padStart(2,'0')} ${d.getHours().toString().padStart(2,'0')}:${d.getMinutes().toString().padStart(2,'0')}`;
}
function escapeHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function openLightbox(type, src) {
  const lb = document.getElementById('lightbox');
  const lc = document.getElementById('lightbox-content');
  lc.innerHTML = type === 'video'
    ? `<video src="${src}" controls autoplay style="max-width:92vw;max-height:85vh;border-radius:8px;"></video>`
    : `<img src="${src}" />`;
  lb.classList.add('active');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('active');
  document.getElementById('lightbox-content').innerHTML = '';
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox(); });

// ページ読み込み時にすでにログイン済みならそのまま表示
if (sessionStorage.getItem('camp_auth')) {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  initViewer();
}
</script>
</body>
</html>
