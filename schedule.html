<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>合宿スケジュール | 夏期強化合宿</title>
<script>if(!sessionStorage.getItem('camp_auth')){location.replace('viewer.html');}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --blue: #1a6fc4; --blue-dark: #0f4d8a; --gray-bg: #f5f6f8; --gray-border: #dde1e7; --gray-text: #6b7280; --text: #1a1d23; }
  body { font-family: 'Noto Sans JP', sans-serif; background: var(--gray-bg); color: var(--text); min-height: 100vh; }
  header { background: var(--blue-dark); color: white; box-shadow: 0 2px 8px rgba(0,0,0,0.15); }
  .header-main { padding: 1rem 1.5rem; display: flex; align-items: center; gap: 0.75rem; }
  .back-btn {
    padding: 0.35rem 0.75rem; border-radius: 6px; font-size: 0.8rem; font-family: inherit;
    font-weight: 500; cursor: pointer; border: 1px solid rgba(255,255,255,0.4);
    background: transparent; color: white; text-decoration: none; display: inline-flex; align-items: center; gap: 0.3rem;
  }
  .back-btn:hover { background: rgba(255,255,255,0.1); }
  .h-sub { font-size: 0.72rem; opacity: 0.7; margin-bottom: 0.1rem; }
  .h-main { font-size: 1.1rem; font-weight: 700; }
  main { max-width: 760px; margin: 0 auto; padding: 1.5rem 1rem; }
  .intro {
    background: white; border-radius: 12px; border: 1px solid var(--gray-border);
    padding: 1.1rem 1.25rem; margin-bottom: 1.25rem; display: flex; align-items: center; gap: 0.75rem;
  }
  .intro-icon { font-size: 2rem; }
  .intro .title { font-size: 1rem; font-weight: 700; margin-bottom: 0.15rem; }
  .intro .sub { font-size: 0.8rem; color: var(--gray-text); }
  .day-card { background: white; border-radius: 12px; border: 1px solid var(--gray-border); margin-bottom: 1.1rem; overflow: hidden; }
  .day-header { background: var(--blue-dark); color: white; padding: 0.75rem 1.25rem; display: flex; align-items: baseline; gap: 0.75rem; }
  .day-label { font-size: 1rem; font-weight: 700; }
  .day-date { font-size: 0.8rem; opacity: 0.8; }
  table { width: 100%; border-collapse: collapse; }
  tr { border-bottom: 1px solid var(--gray-border); }
  tr:last-child { border-bottom: none; }
  td { padding: 0.65rem 1.25rem; font-size: 0.88rem; vertical-align: top; }
  .tc { width: 90px; font-weight: 700; color: var(--blue); white-space: nowrap; }
  .nc { color: var(--gray-text); font-size: 0.8rem; width: 140px; }
  .empty { text-align: center; padding: 3.5rem 1rem; color: var(--gray-text); background: white; border-radius: 12px; border: 1px solid var(--gray-border); }
  .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
  .footer-note { text-align: center; font-size: 0.78rem; color: var(--gray-text); margin-top: 1.5rem; padding-bottom: 2rem; }
</style>
</head>
<body>
<header>
  <div class="header-main">
    <a href="viewer.html" class="back-btn">← 活動レポートへ</a>
    <div>
      <div class="h-sub">陸上競技</div>
      <div class="h-main">夏期強化合宿 スケジュール</div>
    </div>
  </div>
</header>
<main>
  <div class="intro">
    <div class="intro-icon">📅</div>
    <div>
      <div class="title">合宿スケジュール</div>
      <div class="sub">内容は変更になる場合があります。最新情報はスタッフにご確認ください。</div>
    </div>
  </div>
  <div id="container"></div>
  <div class="footer-note">※ このページの内容はスタッフが随時更新しています</div>
</main>
<script>
function esc(s){return(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function render(){
  const days=JSON.parse(localStorage.getItem('camp_schedule')||'[]');
  const el=document.getElementById('container');
  if(!days.length){
    el.innerHTML='<div class="empty"><div class="empty-icon">📋</div>スケジュールはまだ登録されていません</div>';
    return;
  }
  el.innerHTML=days.map(day=>`
    <div class="day-card">
      <div class="day-header">
        <span class="day-label">${esc(day.label)}</span>
        ${day.date?`<span class="day-date">${esc(day.date)}</span>`:''}
      </div>
      <table>
        ${(day.items||[]).map(item=>`
          <tr>
            <td class="tc">${esc(item.time)}</td>
            <td>${esc(item.content)}</td>
            <td class="nc">${esc(item.note||'')}</td>
          </tr>`).join('')}
      </table>
    </div>`).join('');
}
render();
</script>
</body>
</html>
